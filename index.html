<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BookFinder</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-light bg-light">
    <div class="container">
      <span class="navbar-brand">📚 BookFinder</span>

      <div class="d-flex">
        <input id="searchInput"
               class="form-control me-2"
               type="text"
               placeholder="Search books..."
               aria-label="Search books"
               autocomplete="off">
        <button id="searchBtn" class="btn btn-primary">Search</button>
        <button id="darkModeToggle" class="btn btn-outline-secondary ms-2" type="button" aria-label="Toggle dark mode">
          🌙
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container mt-4">

    <h2 class="text-center mb-4">Find your next great read</h2>

    <!-- RECENT SEARCHES -->
    <section class="mb-5">
      <h4>Recent Searches</h4>
      <div id="history" class="mt-2" aria-live="polite">
        <!-- JS will populate -->
      </div>
    </section>

    <!-- FAVOURITES -->
    <section class="mb-5">
      <h4>Your Favourites</h4>
      <div id="favourites" class="mt-2" aria-live="polite">
        <!-- JS will populate -->
      </div>
    </section>

    <!-- RESULTS -->
    <section>
      <h4 class="mb-3">Results</h4>

      <div id="results"
           class="row"
           aria-live="polite"
           aria-busy="false">
        <!-- Books appear here -->
      </div>
    </section>

  </main>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/script.js"></script>

</body>
</html>
